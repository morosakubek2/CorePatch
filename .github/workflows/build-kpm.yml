name: Build KPM CorePatch

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-kpm:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [arm64]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libelf-dev \
          libz-dev \
          libssl-dev \
          binutils \
          gcc \
          make \
          git \
          wget \
          curl \
          xz-utils \
          clang \
          llvm \
          flex \
          bison \
          pahole \
          gcc-aarch64-linux-gnu \
          binutils-aarch64-linux-gnu \
          linux-libc-dev-arm64-cross

    - name: Prepare build environment
      run: |
        mkdir -p kpm_patch/build
        echo "Build environment ready for Apatch KPM"
        
        if [ ! -f "kpm_patch/src/corepatch.c" ]; then
          echo "Error: corepatch.c not found!"
          exit 1
        fi
        echo "Source files verified"

    - name: Build KPM module
      run: |
        cd kpm_patch
        
        # Ustaw ścieżkę do nagłówków kernela dla cross-compilation
        export KARCH_INCLUDE_DIR=/usr/aarch64-linux-gnu/include
        
        chmod +x build.sh
        echo "Building for architecture: ${{ matrix.arch }}"
        
        # Przekazujemy ścieżkę do nagłówków jako zmienną środowiskową lub przez CFLAGS
        make ARCH=${{ matrix.arch }} \
             CROSS_COMPILE=aarch64-linux-gnu- \
             KARCH_INCLUDE=$KARCH_INCLUDE_DIR
        
        if [ ! -f "build/corepatch.kpm" ]; then
          echo "Error: Build failed, corepatch.kpm not found!"
          ls -R build/ || true
          exit 1
        fi
        echo "Build successful!"
        ls -lh build/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: corepatch-kpm-${{ matrix.arch }}
        path: kpm_patch/build/corepatch.kpm
        retention-days: 30
        if-no-files-found: error
