name: Build KPM CorePatch

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-kpm:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          gcc-aarch64-linux-gnu \
          binutils-aarch64-linux-gnu

    - name: Build KPM module
      run: |
        cd kpm_patch
        chmod +x build.sh || true # Skrypt opcjonalny, budujemy przez make
        
        echo "Building for architecture: arm64"
        make ARCH=arm64
        
        # Weryfikacja wyniku
        if [ ! -f "build/corepatch.kpm" ]; then
          echo "Error: Build failed, corepatch.kpm not found!"
          exit 1
        fi
        
        echo "Build successful!"
        ls -lh build/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: corepatch-kpm-arm64
        path: kpm_patch/build/corepatch.kpm
        retention-days: 30
        if-no-files-found: error
