name: Build KPM CorePatch

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-kpm:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [arm64]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          gcc-aarch64-linux-gnu \
          binutils-aarch64-linux-gnu \
          git \
          make \
          wget \
          unzip

    - name: Setup KernelPatch Sources & Download Tools
      run: |
        cd kpm_patch
        
        # 1. Pobranie źródeł KernelPatch (tylko dla nagłówków kernela)
        echo "Cloning KernelPatch sources for headers..."
        git clone --depth 1 https://github.com/bmax121/KernelPatch.git kernel_patch_src
        
        # 2. Pobranie gotowych narzędzi (Release assets)
        echo "Downloading pre-built kptools-linux from latest release..."
        LATEST_URL="https://github.com/bmax121/KernelPatch/releases/latest/download/kptools-linux"
        
        wget -q "$LATEST_URL" -O kernel_patch_src/tools/kptools
        
        if [ ! -f "kernel_patch_src/tools/kptools" ]; then
          echo "Error: Failed to download kptools!"
          exit 1
        fi
        
        chmod +x kernel_patch_src/tools/kptools
        
        # Sprawdzenie czy narzędzie działa
        echo "Verifying kptools..."
        ./kernel_patch_src/tools/kptools --help || true
        
        # Utworzenie linku symbolicznego kpbuild -> kptools (często wymagane przez Makefile)
        ln -sf kptools kernel_patch_src/tools/kpbuild
        
        echo "Tools ready."
      shell: bash

    - name: Build KPM Module
      run: |
        cd kpm_patch
        echo "Building CorePatch for ${{ matrix.arch }}..."
        
        export KP_TOOLS=$(pwd)/kernel_patch_src/tools
        export PATH=$PATH:$KP_TOOLS
        
        # Czyszczenie
        make ARCH=${{ matrix.arch }} KP_ROOT=$(pwd)/kernel_patch_src clean || true
        
        # Budowanie modułu
        # Uwaga: Makefile musi wywoływać kpbuild lub kptools z odpowiednimi parametrami
        make ARCH=${{ matrix.arch }} KP_ROOT=$(pwd)/kernel_patch_src
        
        if [ ! -f "corepatch.kpm" ]; then
          echo "Error: Build failed, corepatch.kpm not found!"
          ls -lh
          exit 1
        fi
        
        echo "Build successful!"
        ls -lh corepatch.kpm
      shell: bash

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: corepatch-kpm-${{ matrix.arch }}
        path: kpm_patch/corepatch.kpm
        retention-days: 30
        if-no-files-found: error
