name: Build KPM CorePatch

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-kpm:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [arm64]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          gcc-aarch64-linux-gnu \
          binutils-aarch64-linux-gnu \
          git \
          make \
          cmake \
          zlib1g-dev \
          liblz4-dev \
          liblzma-dev

    - name: Download and Build KernelPatch Tools
      run: |
        cd kpm_patch
        echo "Cloning KernelPatch..."
        git clone --depth 1 https://github.com/bmax121/KernelPatch.git kernel_patch_src
        
        echo "Building kpbuild tool..."
        cd kernel_patch_src/tools
        make clean
        make -j$(nproc)
        
        # Weryfikacja czy narzędzie powstało
        if [ ! -f "kpbuild" ]; then
          echo "Error: kpbuild compilation failed!"
          ls -la
          exit 1
        fi
        
        chmod +x kpbuild
        echo "kpbuild ready at: $(pwd)/kpbuild"

    - name: Build KPM Module
      run: |
        cd kpm_patch
        KP_TOOLS=$(pwd)/kernel_patch_src/tools
        
        echo "Building CorePatch for ${{ matrix.arch }}..."
        make ARCH=${{ matrix.arch }} KP_TOOLS=$KP_TOOLS clean
        make ARCH=${{ matrix.arch }} KP_TOOLS=$KP_TOOLS
        
        if [ ! -f "corepatch.kpm" ]; then
          echo "Error: Build failed, corepatch.kpm not found!"
          ls -lh
          exit 1
        fi
        
        echo "Build successful!"
        ls -lh corepatch.kpm

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: corepatch-kpm-${{ matrix.arch }}
        path: kpm_patch/corepatch.kpm
        retention-days: 30
        if-no-files-found: error
