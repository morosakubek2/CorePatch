name: Build KPM CorePatch

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-kpm:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [arm64] # Tylko arm64 - większość urządzeń Android

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libelf-dev \
          libz-dev \
          libssl-dev \
          binutils \
          gcc \
          make \
          git \
          wget \
          curl \
          xz-utils \
          clang \
          llvm \
          flex \
          bison \
          pahole \
          gcc-aarch64-linux-gnu \
          binutils-aarch64-linux-gnu

    - name: Prepare build environment
      run: |
        mkdir -p kpm_patch/build
        echo "Build environment ready for Apatch KPM"
        
        # Weryfikacja plików źródłowych
        if [ ! -f "kpm_patch/src/corepatch.c" ]; then
          echo "Error: corepatch.c not found!"
          exit 1
        fi
        echo "Source files verified"

    - name: Build KPM module
      run: |
        cd kpm_patch
        chmod +x build.sh
        
        # Budowanie dla wybranej architektury
        echo "Building for architecture: ${{ matrix.arch }}"
        ./build.sh -a ${{ matrix.arch }}
        
        # Weryfikacja wyniku
        if [ ! -f "build/corepatch.kpm" ]; then
          echo "Error: Build failed, corepatch.kpm not found!"
          exit 1
        fi
        echo "Build successful!"
        ls -lh build/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: corepatch-kpm-${{ matrix.arch }}
        path: kpm_patch/build/corepatch.kpm
        retention-days: 30
        if-no-files-found: error
