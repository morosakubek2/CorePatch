name: Build KPM CorePatch

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [arm64]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          gcc-aarch64-linux-gnu \
          binutils-aarch64-linux-gnu \
          make

    - name: Build KPM
      run: |
        cd kpm_patch
        chmod +x build.sh || true # Optional if using make directly
        
        echo "Building for ${{ matrix.arch }}"
        make ARCH=${{ matrix.arch }}
        
        if [ ! -f "build/corepatch.kpm" ]; then
          echo "Error: Build failed!"
          exit 1
        fi
        
        ls -lh build/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: corepatch-${{ matrix.arch }}
        path: kpm_patch/build/corepatch.kpm
        retention-days: 14
