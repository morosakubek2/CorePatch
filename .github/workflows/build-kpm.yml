name: Build KPM CorePatch

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-kpm:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [arm64]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          gcc-aarch64-linux-gnu \
          binutils-aarch64-linux-gnu \
          git \
          wget \
          curl \
          make \
          zlib1g-dev \
          python3

    - name: Setup KernelPatch Sources & Build kpbuild
      run: |
        cd kpm_patch
        echo "Cloning KernelPatch..."
        git clone --depth 1 https://github.com/bmax121/KernelPatch.git kernel_patch_src
        
        cd kernel_patch_src/tools
        
        # Zamiast budować cały projekt kptools (który wymaga сложного preset.h),
        # zbudujemy samodzielnie tylko narzędzie kpbuild z pliku kpm.c
        # Jest to wystarczające do pakowania modułów .kpm
        
        echo "Building standalone kpbuild tool..."
        
        # Kompilacja kpbuild (na bazie kpm.c) z wymaganymi flagami
        gcc -O2 -o kpbuild kpm.c common.c order.c insn.c symbol.c image.c kallsym.c patch.c \
             -I. -Ielf -Ilib/sha -Ilib/lz4 -Ilib/xz -Ilib/bz2 \
             -lz -lm
        
        if [ ! -f "kpbuild" ]; then
          echo "Error: Failed to build kpbuild!"
          exit 1
        fi
        
        chmod +x kpbuild
        echo "kpbuild built successfully at $(pwd)/kpbuild"
      shell: bash

    - name: Build KPM Module
      run: |
        cd kpm_patch
        echo "Building CorePatch for ${{ matrix.arch }}..."
        
        # Eksport ścieżki do narzędzi
        export KP_TOOLS=$(pwd)/kernel_patch_src/tools
        export PATH=$PATH:$KP_TOOLS
        
        # Czyszczenie i budowanie
        make ARCH=${{ matrix.arch }} KP_ROOT=$(pwd)/kernel_patch_src clean || true
        make ARCH=${{ matrix.arch }} KP_ROOT=$(pwd)/kernel_patch_src
        
        if [ ! -f "corepatch.kpm" ]; then
          echo "Error: Build failed, corepatch.kpm not found!"
          ls -lh
          exit 1
        fi
        
        echo "Build successful!"
        ls -lh corepatch.kpm
      shell: bash

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: corepatch-kpm-${{ matrix.arch }}
        path: kpm_patch/corepatch.kpm
        retention-days: 30
        if-no-files-found: error
