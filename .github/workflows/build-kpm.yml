name: Build KPM CorePatch

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-kpm:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [arm64]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          gcc-aarch64-linux-gnu \
          binutils-aarch64-linux-gnu \
          git \
          wget \
          curl \
          make \
          cmake \
          libssl-dev \
          python3 \
          zlib1g-dev

    - name: Setup KernelPatch Sources & Build Tools
      working-directory: kpm_patch
      run: |
        echo "Cloning KernelPatch..."
        git clone --depth 1 https://github.com/bmax121/KernelPatch.git kernel_patch_src
        
        cd kernel_patch_src/tools
        
        # Generowanie brakującego pliku preset.h
        echo "Generating preset.h..."
        cat > preset.h << 'EOF'
#ifndef _PRESET_H
#define _PRESET_H
#define DEFAULT_BANNER "Linux version"
#define DEFAULT_KALLSYMS "/proc/kallsyms"
#define DEFAULT_BOOT_IMG "boot.img"
#define DEFAULT_PATCH_IMG "patch.img"
#define DEFAULT_OUT_IMG "out.img"
#define DEFAULT_KPM_DIR "."
#define DEFAULT_KP_BASE 0
#define DEFAULT_SUPER_CALL 0
#define DEFAULT_SUPER_CMD 0
#define DEFAULT_INIT_RC_PATCH 1
#define DEFAULT_SELINUX_POLICY_PATCH 1
#define DEFAULT_OVERLAYFS_MOUNT 1
#define DEFAULT_SUDOERS_ADD 1
#define DEFAULT_SU_PATH "/system/bin/su"
#define DEFAULT_MAGISKBOOT ""
#define DEFAULT_DTC ""
#endif
EOF
        
        echo "Building kpbuild tool..."
        cmake -S . -B build
        cmake --build build -j$(nproc)
        
        if [ ! -f "build/kpbuild" ]; then
            echo "Error: kpbuild not found!"
            ls -R build/
            exit 1
        fi
        
        cp build/kpbuild ./kpbuild
        chmod +x ./kpbuild
        echo "kpbuild ready."

    - name: Build KPM Module
      working-directory: kpm_patch
      run: |
        export KP_TOOLS=$(pwd)/kernel_patch_src/tools
        export PATH=$PATH:$KP_TOOLS
        
        echo "Building CorePatch for ${{ matrix.arch }}..."
        make ARCH=${{ matrix.arch }} KP_ROOT=$(pwd)/kernel_patch_src clean
        make ARCH=${{ matrix.arch }} KP_ROOT=$(pwd)/kernel_patch_src
        
        if [ ! -f "corepatch.kpm" ]; then
            echo "Error: Build failed, corepatch.kpm not found!"
            ls -lh
            exit 1
        fi
        
        echo "Build successful!"
        ls -lh corepatch.kpm

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: corepatch-kpm-${{ matrix.arch }}
        path: kpm_patch/corepatch.kpm
        retention-days: 30
        if-no-files-found: error
