name: Build KPM CorePatch

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-kpm:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [arm64] # Możesz dodać arm, x86_64 jeśli potrzebujesz

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          gcc-aarch64-linux-gnu \
          binutils-aarch64-linux-gnu \
          git \
          wget \
          curl \
          make \
          cmake \
          libssl-dev \
          zlib1g-dev \
          python3

    - name: Setup KernelPatch & Generate Presets
      run: |
        cd kpm_patch
        echo "Cloning KernelPatch..."
        git clone --depth 1 https://github.com/bmax121/KernelPatch.git kernel_patch_src
        
        echo "Generating preset.h..."
        cd kernel_patch_src/tools
        # To jest kluczowy krok, którego brakowało - generuje preset.h na podstawie szablonu
        if [ -f preset.h.template ]; then
            cp preset.h.template preset.h
            echo "preset.h generated from template."
        elif [ -f ../kernel/patch/include/kconfig.h ]; then
            # Fallback: czasem preset.h musi być wygenerowany skryptem, ale w nowych wersjach często wystarczy kopiowanie
            echo "No template found, checking for alternative generation methods..."
            # W najnowszych wersjach KP często preset.h jest już w repo lub generowany przez make
            make gen_preset || echo "Make gen_preset not available, trying manual creation..."
        else
            # Ręczne stworzenie minimalnego preset.h jeśli wszystko inne zawiedzie (rzadko potrzebne)
            echo "Creating minimal preset.h..."
            cat > preset.h << 'EOF'
#ifndef _PRESET_H
#define _PRESET_H
// Minimal preset for building tools
#endif
EOF
        fi
        
        echo "Building kpbuild tool..."
        cmake -S . -B build
        cmake --build build -j$(nproc)
        
        if [ ! -f "build/kpbuild" ]; then
            echo "Error: kpbuild not found!"
            ls -R build/
            exit 1
        fi
        
        cp build/kpbuild ./kpbuild
        chmod +x ./kpbuild
        echo "Tools built successfully."

    - name: Build KPM Module
      run: |
        cd kpm_patch
        export KP_ROOT=$(pwd)/kernel_patch_src
        export PATH=$PATH:$KP_ROOT/tools
        
        echo "Building CorePatch for ${{ matrix.arch }}..."
        make ARCH=${{ matrix.arch }} KP_ROOT=$KP_ROOT clean
        make ARCH=${{ matrix.arch }} KP_ROOT=$KP_ROOT
        
        if [ ! -f "corepatch.kpm" ]; then
            echo "Error: Build failed! corepatch.kpm not found."
            ls -lh
            exit 1
        fi
        
        echo "Build successful!"
        ls -lh corepatch.kpm

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: corepatch-kpm-${{ matrix.arch }}
        path: kpm_patch/corepatch.kpm
        retention-days: 30
        if-no-files-found: error
