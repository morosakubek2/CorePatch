name: Build KPM CorePatch

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-kpm:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [arm64]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          gcc-aarch64-linux-gnu \
          binutils-aarch64-linux-gnu \
          git \
          wget \
          curl \
          make \
          python3

    - name: Download KernelPatch Sources
      run: |
        echo "Downloading KernelPatch sources for headers and tools..."
        cd kpm_patch
        git clone --depth 1 https://github.com/bmax121/KernelPatch.git kernel_patch_src
        
        # Verify tools exist
        if [ ! -f "kernel_patch_src/tools/kpbuild" ]; then
          echo "Error: kpbuild not found in downloaded sources!"
          ls -R kernel_patch_src
          exit 1
        fi
        chmod +x kernel_patch_src/tools/kpbuild
        echo "KernelPatch sources ready."

    - name: Build KPM Module
      run: |
        cd kpm_patch
        echo "Building for architecture: ${{ matrix.arch }}"
        make ARCH=${{ matrix.arch }} clean
        make ARCH=${{ matrix.arch }}
        
        # Verify output
        if [ ! -f "corepatch.kpm" ]; then
          echo "Error: Build failed, corepatch.kpm not found!"
          exit 1
        fi
        ls -lh corepatch.kpm

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: corepatch-kpm-${{ matrix.arch }}
        path: kpm_patch/corepatch.kpm
        retention-days: 30
        if-no-files-found: error
